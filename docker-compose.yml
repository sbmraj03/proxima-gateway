services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./dashboard/dist:/usr/share/nginx/dashboard
    depends_on:
      - proxima

  proxima:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - redis
    env_file:
      - .env.docker
    environment:
      - REDIS_URL=redis://redis:6379

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend1:
    build:
      context: .
      dockerfile: Dockerfile.backend1
    ports:
      - "4001:4001"

  backend2:
    build:
      context: .
      dockerfile: Dockerfile.backend2
    ports:
      - "4002:4002"

volumes:
  redis_data: